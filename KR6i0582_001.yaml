body:
  text: 爾時佛在王舍城中與諸大衆俱會阿難長跪合掌白佛言世尊彼南閻浮提世界忽遇天行溫氣瘴烈如猛火橫延及死亡無數如何免之佛告阿難汝可諦聽吾當為汝説此病有鬼神常吐惡毒以害人民初得病時頭痛寒熱百支節俱苦痛畢切阿難言若有善男子善女人能知七鬼神名字作崇敬當除此病患乎為汝即説除病呪曰南無佛陀耶南無達磨耶南無僧伽耶南無觀世音菩薩摩訶薩疫病消除娑婆訶爾時十方諸佛諸大菩薩一切賢聖僧聞我説金剛祕密呪亦説七鬼神名字曰夢多難鬼阿佉尼鬼尼佉尸鬼阿伽那鬼波羅尼鬼阿毗羅鬼婆提梨鬼也汝等當知此神名思念速疾遠離不敢侵害其人所被毒氣普皆消散得金剛密迹其身安樂無諸患難佛説是經已天龍八部一切大衆皆大歡喜信受奉行
